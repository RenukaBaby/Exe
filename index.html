(function(){
  function rand(len){
    var s = "abcdefghijklmnopqrstuvwxyz0123456789";
    var o = "";
    for (var i = 0; i < len; i++) o += s.charAt(Math.floor(Math.random() * s.length));

  }

  function getParam(name){
    var m = location.search.match(new RegExp("[?&]" + name + "=([^&]*)"));

  }

  // -------- AUTO-CLICK: Use Android bridge for persistent count --------
  var adLoadCount = 0;

      adLoadCount = AndroidBridge.getAdLoadCount();
      console.log('[AUTO-CLICK] Got count from Android bridge:', adLoadCount);
    } else {
      console.log('[AUTO-CLICK] ⚠️ AndroidBridge not available, using localStorage');
      adLoadCount = parseInt(localStorage.getItem("adLoadCount") || "0", 10);
    }
  } catch(e) {
    console.log('[AUTO-CLICK] Error reading count:', e.message);
    adLoadCount = parseInt(localStorage.getItem("adLoadCount") || "0", 10);
  }
  
  adLoadCount++;
  console.log('[AUTO-CLICK] New count:', adLoadCount, '(will click on 3rd, 6th, 9th...)');
  
  // Save to both bridge and localStorage
  try {
    if (typeof AndroidBridge !== 'undefined') {
      AndroidBridge.setAdLoadCount(adLoadCount);
    }
    localStorage.setItem("adLoadCount", String(adLoadCount));
  } catch(e) {
    console.log('[AUTO-CLICK] Error saving count:', e.message);
  }

  // -------- Wipe other storage --------
  try { sessionStorage.clear(); } catch(e){}
  try {
    if (window.indexedDB && indexedDB.databases) {
      indexedDB.databases().then(function(dbs){
        (dbs || []).forEach(function(db){ try { indexedDB.deleteDatabase(db.name); } catch(e){} });
      }).catch(function(){});
    }
  } catch(e){}
  try {
    document.cookie.split(";").forEach(function(c){
      var eq = c.indexOf("=");
      var name = (eq > -1 ? c.substr(0, eq) : c).trim();
      document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/";

  } catch(e){}

  // -------- Seed fingerprint --------
